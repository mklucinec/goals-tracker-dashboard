<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Goals Tracker Dashboard</title>
</head>
<body>
  <h1>Goals Tracker</h1>
  <pre id="output">Loading…</pre>

  <script>
    fetch('./data/goals-tracker.json?ts=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('output').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('output').textContent = err.toString();
      });
  </script>
</body>
</html>
