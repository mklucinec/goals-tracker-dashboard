<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Goals Tracker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    h2 {
      margin-top: 40px;
    }

    .updated {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 20px;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #2f5bea;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .zero {
      color: #999;
    }
  </style>
</head>

<body>

<h1>Goals Tracker</h1>
<div class="updated" id="lastUpdated">Loading…</div>

<h2>Monthly New Premium</h2>
<table>
  <thead>
    <tr><th>Agent</th><th>Premium</th></tr>
  </thead>
  <tbody id="monthlyTable"></tbody>
</table>

<h2>Weekly Agent Breakdown</h2>
<table>
  <thead>
    <tr><th>Agent</th><th>Policies</th><th>Premium</th></tr>
  </thead>
  <tbody id="weeklyTable"></tbody>
</table>

<h2>Weekly Incentives</h2>
<table>
  <thead>
    <tr><th>Policies</th><th>Status</th></tr>
  </thead>
  <tbody id="incentivesTable"></tbody>
</table>

<h2>Goal Levels</h2>
<table>
  <thead>
    <tr><th>Level</th><th>Threshold</th><th>Label</th><th>Unlocked</th></tr>
  </thead>
  <tbody id="levelsTable"></tbody>
</table>

<h2>Drawings</h2>
<table>
  <thead>
    <tr><th>Type</th><th>Agent</th><th>Required</th><th>Locked</th></tr>
  </thead>
  <tbody id="drawingsTable"></tbody>
</table>

<script>
fetch('./data/goals-tracker.json?nocache=' + new Date().getTime())
  .then(r => r.json())
  .then(data => {

    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date(data.meta.lastUpdated).toLocaleString();

    // Monthly
    data.monthlyNewPremium.forEach(r => {
      monthlyTable.innerHTML += `
        <tr>
          <td>${r.Agent}</td>
          <td class="${Number(r.Amount) === 0 ? 'zero' : ''}">
            ${Number(r.Amount).toLocaleString('en-US',{style:'currency',currency:'USD'})}
          </td>
        </tr>`;
    });

    // Weekly breakdown
    data.weeklyAgentBreakdown.forEach(r => {
      weeklyTable.innerHTML += `
        <tr>
          <td>${r.Agent}</td>
          <td>${r.Policies}</td>
          <td>${Number(r.Premium).toLocaleString('en-US',{style:'currency',currency:'USD'})}</td>
        </tr>`;
    });

    // Weekly incentives
    data.weeklyIncentives.forEach(r => {
      incentivesTable.innerHTML += `
        <tr>
          <td>${r.Policies}</td>
          <td>${r.StatusMessage}</td>
        </tr>`;
    });

    // Goal levels
    data.goalLevels.forEach(r => {
      levelsTable.innerHTML += `
        <tr>
          <td>${r.Level}</td>
          <td>${r.Threshold}</td>
          <td>${r.Label}</td>
          <td>${r.Unlocked}</td>
        </tr>`;
    });

    // Drawings
    data.drawings.forEach(r => {
      drawingsTable.innerHTML += `
        <tr>
          <td>${r.Type}</td>
          <td>${r.Agent}</td>
          <td>${r.Required}</td>
          <td>${r.Locked}</td>
        </tr>`;
    });

  })
  .catch(err => {
    document.body.innerHTML = '<h2>Error loading dashboard</h2><pre>' + err + '</pre>';
  });
</script>

</body>
</html>
