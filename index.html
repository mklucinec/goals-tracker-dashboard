<script>
fetch('./data/goals-tracker.json?ts=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('output').textContent =
      JSON.stringify(data, null, 2);
  })
  .catch(err => {
    document.getElementById('output').textContent =
      'ERROR: ' + err.message;
  });
</script>
