<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Goals Tracker Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      overflow: auto;
      max-height: 80vh;
    }
  </style>
</head>
<body>

  <h1>Goals Tracker</h1>
  <p>Live data from GitHub</p>

  <!-- ✅ THIS ELEMENT MUST EXIST -->
  <pre id="output">Loading…</pre>

  <script>
    fetch('./data/goals-tracker.json?ts=' + Date.now())
      .then(r => r.json())
      .then(data => {
        document.getElementById('output').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('output').textContent =
          'Error: ' + err.toString();
      });
  </script>

</body>
</html>
