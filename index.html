<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Goals Tracker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    .updated {
      color: #555;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #e0e0e0;
      text-align: left;
    }

    th {
      background: #2f5bea;
      color: white;
      font-weight: normal;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    .zero {
      color: #aaa;
    }

    .unlocked {
      color: #1a7f37;
      font-weight: bold;
    }

    .locked {
      color: #999;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.8em;
      display: inline-block;
    }

    .badge-green {
      background: #e6f4ea;
      color: #137333;
    }

    .badge-gray {
      background: #f1f3f4;
      color: #555;
    }
  </style>
</head>

<body>

<h1>🎯 Goals Tracker</h1>
<div class="updated" id="lastUpdated">Loading…</div>

<div class="card">
  <h2>💰 Monthly New Premium</h2>
  <table>
    <thead>
      <tr><th>Agent</th><th>Premium</th></tr>
    </thead>
    <tbody id="monthlyTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>🏆 Weekly Agent Breakdown</h2>
  <table>
    <thead>
      <tr><th>Agent</th><th>Policies</th><th>Premium</th></tr>
    </thead>
    <tbody id="weeklyTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>🎉 Weekly Incentives</h2>
  <table>
    <thead>
      <tr><th>Policies</th><th>Status</th></tr>
    </thead>
    <tbody id="incentivesTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>🔓 Goal Levels</h2>
  <table>
    <thead>
      <tr><th>Level</th><th>Threshold</th><th>Reward</th><th>Status</th></tr>
    </thead>
    <tbody id="levelsTable"></tbody>
  </table>
</div>

<div class="card">
  <h2>🎁 Drawings</h2>
  <table>
    <thead>
      <tr><th>Type</th><th>Agent</th><th>Required</th><th>Status</th></tr>
    </thead>
    <tbody id="drawingsTable"></tbody>
  </table>
</div>

<script>
fetch('./data/goals-tracker.json?ts=' + Date.now())
  .then(r => r.json())
  .then(data => {

    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date(data.meta.lastUpdated).toLocaleString();

    // Monthly
    data.monthlyNewPremium.forEach(r => {
      monthlyTable.innerHTML += `
        <tr>
          <td>${r.Agent}</td>
          <td class="${Number(r.Amount) === 0 ? 'zero' : ''}">
            ${Number(r.Amount).toLocaleString('en-US',{style:'currency',currency:'USD'})}
          </td>
        </tr>`;
    });

    // Weekly breakdown
    data.weeklyAgentBreakdown.forEach(r => {
      weeklyTable.innerHTML += `
        <tr>
          <td>${r.Agent}</td>
          <td>${r.Policies}</td>
          <td>${Number(r.Premium).toLocaleString('en-US',{style:'currency',currency:'USD'})}</td>
        </tr>`;
    });

    // Weekly incentives
    data.weeklyIncentives.forEach(r => {
      incentivesTable.innerHTML += `
        <tr>
          <td>${r.Policies}</td>
          <td>🎯 ${r.StatusMessage}</td>
        </tr>`;
    });

    // Goal levels
    data.goalLevels.forEach(r => {
      const unlocked = r.Unlocked === true || r.Unlocked === "True";
      levelsTable.innerHTML += `
        <tr>
          <td>Level ${r.Level}</td>
          <td>${r.Threshold}</td>
          <td>${r.Label}</td>
          <td class="${unlocked ? 'unlocked' : 'locked'}">
            ${unlocked ? '✅ Unlocked' : '🔒 Locked'}
          </td>
        </tr>`;
    });

    // Drawings
    data.drawings.forEach(r => {
      const locked = r.Locked === true || r.Locked === "True";
      drawingsTable.innerHTML += `
        <tr>
          <td>🎁 ${r.Type}</td>
          <td>${r.Agent}</td>
          <td>${r.Required}</td>
          <td>
            <span class="badge ${locked ? 'badge-gray' : 'badge-green'}">
              ${locked ? '🔒 Locked' : '🎉 Eligible'}
            </span>
          </td>
        </tr>`;
    });

  })
  .catch(err => {
    document.body.innerHTML =
      '<h2>Error loading dashboard</h2><pre>' + err + '</pre>';
  });
</script>

</body>
</html>
