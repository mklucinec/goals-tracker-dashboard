<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Goals Tracker Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    .updated {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-bottom: 30px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #2f5bea;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    .zero {
      color: #999;
    }

    .section {
      margin-bottom: 40px;
    }
  </style>
</head>

<body>

  <h1>Goals Tracker</h1>
  <div class="updated" id="lastUpdated">Loading…</div>

  <div class="section">
    <h2>Monthly New Premium</h2>
    <table>
      <thead>
        <tr>
          <th>Agent</th>
          <th>Premium</th>
        </tr>
      </thead>
      <tbody id="monthlyTable"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>Weekly Agent Breakdown</h2>
    <table>
      <thead>
        <tr>
          <th>Agent</th>
          <th>Policies</th>
          <th>Premium</th>
        </tr>
      </thead>
      <tbody id="weeklyTable"></tbody>
    </table>
  </div>

  <script>
    fetch('./data/goals-tracker.json?ts=' + Date.now())
      .then(res => res.json())
      .then(data => {

        // Last updated
        document.getElementById('lastUpdated').textContent =
          'Last updated: ' + new Date(data.meta.lastUpdated).toLocaleString();

        // Monthly new premium
        const monthlyBody = document.getElementById('monthlyTable');
        monthlyBody.innerHTML = '';

        data.monthlyNewPremium.forEach(row => {
          const tr = document.createElement('tr');

          const agent = document.createElement('td');
          agent.textContent = row.Agent;

          const amount = document.createElement('td');
          amount.textContent = Number(row.Amount).toLocaleString('en-US', {
            style: 'currency',
            currency: 'USD'
          });

          if (Number(row.Amount) === 0) {
            amount.classList.add('zero');
          }

          tr.appendChild(agent);
          tr.appendChild(amount);
          monthlyBody.appendChild(tr);
        });

        // Weekly breakdown
        const weeklyBody = document.getElementById('weeklyTable');
        weeklyBody.innerHTML = '';

        data.weeklyAgentBreakdown.forEach(row => {
          const tr = document.createElement('tr');

          const agent = document.createElement('td');
          agent.textContent = row.Agent;

          const policies = document.createElement('td');
          policies.textContent = row.Policies;

          const premium = document.createElement('td');
          premium.textContent = Number(row.Premium).toLocaleString('en-US', {
            style: 'currency',
            currency: 'USD'
          });

          tr.appendChild(agent);
          tr.appendChild(policies);
          tr.appendChild(premium);
          weeklyBody.appendChild(tr);
        });

      })
      .catch(err => {
        document.body.innerHTML =
          '<h2>Error loading dashboard</h2><pre>' + err + '</pre>';
      });
  </script>

</body>
</html>
